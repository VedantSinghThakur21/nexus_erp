name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          ERP_NEXT_URL: http://127.0.0.1:8080
          ERP_API_KEY: ci-placeholder
          ERP_API_SECRET: ci-placeholder
          FRAPPE_SITE_NAME: erp.localhost
          NEXT_PUBLIC_ROOT_DOMAIN: avariq.in

      - name: Start server
        run: |
          npm run start &
          npx wait-on http://127.0.0.1:3000 --timeout 120000

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:3000/site
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
