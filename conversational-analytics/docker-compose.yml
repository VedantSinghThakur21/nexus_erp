# Conversational Analytics Service — Docker Compose
#
# This container runs a lightweight FastAPI service that provides
# conversational analytics over ERPNext data via LLM-driven tool-calling.
# Deployed alongside the existing provisioning service.

services:
  conversational-analytics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-conversational-analytics
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      # IMPORTANT: 127.0.0.1 inside Docker refers to the container itself, NOT the host.
      # Use host-gateway to reach services running on the Ubuntu host (e.g. ERPNext on port 8080).
      # Override by setting ERPNEXT_URL in your .env file if ERPNext is on a different host/port.
      - ERPNEXT_URL=${ERPNEXT_URL:-http://host-gateway:8080}
      - ERPNEXT_API_KEY=${ERPNEXT_API_KEY}
      - ERPNEXT_API_SECRET=${ERPNEXT_API_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SITE_URL=${SITE_URL:-https://nexus-erp.com}
      - ROOT_DOMAIN=${NEXT_PUBLIC_ROOT_DOMAIN:-avariq.in}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ANALYTICS_PORT=8003
    extra_hosts:
      # Resolves "host-gateway" to the Docker host's IP on Linux.
      # This is the standard way to reach the host from inside a container.
      - "host-gateway:host-gateway"
    networks:
      - default
      - frappe_docker_default
    volumes:
      # Persist LLM call logs across container restarts
      - analytics-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - default
      - frappe_docker_default
networks:
  frappe_docker_default:
    external: true

volumes:
  analytics-logs:

networks:
  # Attach to the ERPNext stack network so we can reach ERPNext by docker DNS
  # (e.g. http://frontend:8080) reliably across restarts.
  frappe_docker_default:
    external: true
